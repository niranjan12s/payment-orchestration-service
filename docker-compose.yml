version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: payment-orchestrator-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: payment_orchestrator
      POSTGRES_USER: orchestrator_admin
      POSTGRES_PASSWORD: orchestrator_secure_pwd_2026
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orchestrator_admin -d payment_orchestrator"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: payment-orchestrator-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
